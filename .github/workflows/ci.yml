name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sanity-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run conflict marker guard
        run: npm run check:conflicts

      - name: Run critical flow checks
        run: npm run test:critical-flows
